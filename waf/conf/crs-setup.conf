# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OWASP CRS — Rule Tuning & Overrides
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# -- Paranoia Level: 2 = hardened (1=basic, 2=hardened, 3=strict, 4=extreme)
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

# -- Enforce body processor for JSON APIs
SecAction "id:900010,phase:1,nolog,pass,t:none,setvar:tx.enforce_bodyproc_urlencoded=1"

# -- Anomaly scoring thresholds (lower = stricter)
SecAction "id:900100,phase:1,nolog,pass,t:none, \
    setvar:tx.inbound_anomaly_score_threshold=5, \
    setvar:tx.outbound_anomaly_score_threshold=4"

# -- Block on high anomaly (enforcing mode)
SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.blocking_early=1"

# -- Allowed HTTP methods (only what the app needs)
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:'tx.allowed_methods=GET HEAD POST PUT PATCH DELETE OPTIONS'"

# -- Allowed request content types
SecAction "id:900220,phase:1,nolog,pass,t:none, \
    setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/octet-stream|'"

# -- Allowed response content types
SecAction "id:900280,phase:1,nolog,pass,t:none, \
    setvar:'tx.allowed_http_versions=HTTP/1.1 HTTP/2 HTTP/2.0'"

# -- File extensions to block
SecAction "id:900240,phase:1,nolog,pass,t:none, \
    setvar:'tx.restricted_extensions=.asa/ .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/'"

# -- Block specific headers
SecAction "id:900250,phase:1,nolog,pass,t:none, \
    setvar:'tx.restricted_headers=/proxy/ /lock-token/ /content-range/ /if/'"

# -- GeoIP (disabled — not needed for this project)
# SecGeoLookupDB /etc/modsecurity/GeoIP.dat
