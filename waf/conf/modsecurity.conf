# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ModSecurity WAF — Main Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# -- Engine ON = enforce rules and block violations
SecRuleEngine On

# -- Request body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# -- Response body inspection
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# -- Temp and data directories
SecTmpDir /tmp/
SecDataDir /tmp/

# -- Audit logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /tmp/modsec_audit.log

# -- Debug log (set to 0 in production)
SecDebugLog /tmp/modsec_debug.log
SecDebugLogLevel 0

# -- Handling of multipart/form-data
SecRule MULTIPART_STRICT_ERROR "!@eq 0" \
    "id:'200002',phase:2,t:none,log,deny,status:400, \
    msg:'Multipart request body failed strict validation'"

SecRule MULTIPART_UNMATCHED_BOUNDARY "!@eq 0" \
    "id:'200003',phase:2,t:none,log,deny,status:44, \
    msg:'Multipart parser detected a possible unmatched boundary'"

# -- PCRE limits
SecPcreMatchLimit 1000
SecPcreMatchLimitRecursion 1000

# -- Server signature masking
SecServerSignature "Server"

# -- Unicode mapping
SecUnicodeMapFile unicode.mapping 20127

# -- Status and anomaly scoring
SecStatusEngine On
