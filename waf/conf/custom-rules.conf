# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Custom SSBS WAF Rules — App-specific protections
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# -- Block access to hidden files / dotfiles (allow .vite for dev server)
SecRule REQUEST_URI "@rx /\.(?!vite/)" \
    "id:10001,phase:1,deny,status:403,log,msg:'Access to dotfile blocked'"

# -- Block access to backup files
SecRule REQUEST_URI "@rx \.(bak|old|orig|save|swp|temp|tmp|dist)$" \
    "id:10002,phase:1,deny,status:403,log,msg:'Access to backup file blocked'"

# -- Block access to sensitive paths
SecRule REQUEST_URI "@rx /(\.env|\.git|docker-compose|Dockerfile|Makefile|manage\.py|requirements\.txt)" \
    "id:10003,phase:1,deny,status:403,log,msg:'Access to sensitive path blocked'"

# -- Block requests with suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (nikto|sqlmap|nmap|dirbuster|masscan|havij|w3af)" \
    "id:10004,phase:1,deny,status:403,log,msg:'Malicious user-agent blocked'"

# -- Block HTTP methods not used by the app
SecRule REQUEST_METHOD "!@rx ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$" \
    "id:10008,phase:1,deny,status:405,log,msg:'HTTP method not allowed'"

# -- Block requests with empty Host header
SecRule REQUEST_HEADERS:Host "@rx ^$" \
    "id:10010,phase:1,deny,status:400,log,msg:'Empty Host header'"
